# RS485 bus witness: dumps every received byte to logs.
# Use this on a 2nd ESP wired in parallel on A/B of the Hörmann bus,
# with DE and /RE of the RS485 module tied to GND (RX-only).

substitutions:
  device_name: hormann-witness
  friendly_name: "Hormann Bus Witness"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: ${device_name}.intra.sberard.fr

  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

captive_portal:

logger:
  level: VERBOSE

packages:
  device_base:
    url: https://github.com/AntorFr/esphome-projects
    ref: master
    files: [ packages/device_base.yaml ]
    refresh: 0s

uart:
  id: bus_uart
  rx_pin: GPIO18     # RO of RS485 module
  tx_pin: GPIO17     # DI (unused but ESPHome requires both)
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512
  debug:
    direction: RX
    dummy_receiver: true
    after:
      timeout: 5ms
      bytes: 64
