substitutions:
  device_name: office-hallway-light-switch
  friendly_name: "Bouton couloir bureau"
  area: "Bureau"

  ha_plafonnier_id: light.bouton_lumiere_bureau_couloir
  nightlight_room_type: standard

  # ESP-NOW — MAC WiFi de office-light-switch (receiver)
  espnow_peer_mac: "54:43:B2:71:BB:38"   # MAC de office-light-switch

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

packages:
  device_base: !include packages/device_base.yaml
  tx_ultimate_migrated: !include packages/tx_ultimate_migrated.yaml

# ── ESP-NOW fallback : envoie les commandes à office-light-switch (relay_2) ────────
external_components:
  - source:
      type: git
      url: https://github.com/AntorFr/esphome-espnow
      ref: main
    refresh: 0s
    components: [espnow_sender]

espnow_sender:
  id: espnow_tx
  peer_mac: ${espnow_peer_mac}
  connectivity_sensor_id: api_connected
  fallback_timeout: 30s
  recovery_timeout: 10s
  action: toggle
  #on_fallback_enter:
  #  - light.turn_on: {id: leds_top, effect: "Scan"}
  #on_fallback_exit:
  #  - light.turn_on: {id: leds_top}

binary_sensor:
  - platform: homeassistant
    id: plafonnier_state
    entity_id: ${ha_plafonnier_id}
    internal: true
    trigger_on_initial_state: true


tx_ultimate_switch:
  nightlight:
    room_type: ${nightlight_room_type}

  buttons:
    - position: center
      switch_relay: false
      state_sensor: plafonnier_state
      relay: 
        id: relay_1
        name: "Relay"
        restore_mode: RESTORE_DEFAULT_ON
        entity_category: diagnostic
        internal: false
      sensor:
        name: "Bouton"
        icon: mdi:gesture-tap
        device_class: motion
        on_press:
          - lambda: id(espnow_tx).send_command(true);


