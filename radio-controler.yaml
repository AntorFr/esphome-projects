substitutions:
  device_name: radio-controler
  friendly_name: "Radio controler"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2024.12.0
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_SPIRAM: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  baud_rate: 115200


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: ${device_name}.intra.sberard.fr.

  ap:
    ssid: ${device_name}
    password: !secret ap_password


api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption


ota:
  platform: esphome
  password: !secret ota_password


#######################################
# Device specific Config Begins Below #
#######################################
packages:
  device_base: !include packages/device_base.yaml

# ---------- I2C bus (OLED + AXP2101 PMU) ----------
i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 400kHz
  scan: true
  id: bus_a

# ---------- OLED SH1106 128x64 ----------
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_med
    size: 14

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled
    update_interval: 500ms
    lambda: |-
      it.printf(0, 0,  id(font_med),   "T-TWR");
      it.printf(0, 18, id(font_small), "boot ok");
      it.printf(0, 32, id(font_small), "PTT: %s",
        id(btn_ptt).state ? "DOWN" : "up");
      it.printf(0, 46, id(font_small), "Enc: %d",
        (int) id(enc).state);

# ---------- WS2812 status LED ----------
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO42
    num_leds: 1
    default_transition_length: 0s

# ---------- Buttons ----------
binary_sensor:
  - platform: gpio
    id: btn_ptt
    name: "PTT button"
    pin:
      number: GPIO3
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on_off: 20ms

  - platform: gpio
    id: btn_boot
    name: "Boot button"
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on_off: 20ms

  - platform: gpio
    id: btn_enc_ok
    name: "Encoder OK"
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on_off: 20ms

# ---------- Rotary encoder + system sensors ----------
sensor:
  - platform: rotary_encoder
    id: enc
    name: "Encoder"
    pin_a:
      number: GPIO47
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO46
      mode:
        input: true
        pullup: true
    resolution: 1
    publish_initial_value: true

