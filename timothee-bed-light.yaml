# Read by the Fleet for ESPHome add-on. Do not remove.
# esphome-fleet:
#   tags: day_only

substitutions:
  device_name: timothee-bed-light
  friendly_name: Lumières lit Timothée

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name} 

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: ${device_name}.intra.sberard.fr.

  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

captive_portal:

logger:
  level: DEBUG

web_server:

#######################################
# Device specific Config Begins Below #
#######################################
packages:
  device_base: !include packages/device_base.yaml
    #url: https://github.com/AntorFr/esphome-projects
    #file: packages/device_base.yaml
  athom-strip-controller: !include packages/athom-strip-controller.yaml

# Test du limiteur de courant soft (PR esphome#15348, pas encore mergée).
# Estime la conso depuis le buffer de pixels et scale uniformément la sortie
# physique pour rester sous max_current_ma (l'état HA reste inchangé).
# ⚠️ Limite connue de la PR : le throttling est inactif pendant les effets.
# À retirer quand la PR sera mergée dans une release ESPHome.
external_components:
  - source: github://pr#15348
    components: [light]
    refresh: 1h

light:
  - id: !extend led
    power_estimation:
      # Bande WS2811 5V (~60 mA/pixel blanc plein), défauts 20 mA/canal OK.
      # Seuil calé sur le palier de brown-out empirique : 56% blanc (~770 mA)
      # stable, 57% (~806 mA) fait crasher l'ESP (rail 5V qui s'affaisse ->
      # reset -> le relais power_supply s'ouvre). On plafonne à 700 mA avec
      # une marge, HA continue d'afficher 100% (throttling physique seul).
      # ⚠️ Pansement : cap inactif pendant les effets (limite PR esphome#15348),
      # et masque un vrai défaut du chemin d'alim (0,8 A ne devrait pas crasher
      # une alim 10A -> fil/connecteur PSU->carte a revoir).
      max_current_ma: 700
