substitutions:
  device_name: desk-light-switch
  friendly_name: "Bouton applique bureau"
  area: "Bureau"

  ha_applique_id: light.hue_color_lamp_5_3
  ha_plafonnier_id: light.bouton_lumiere_bureau_spots

  nightlight_room_type: "bedroom"

  espnow_peer_mac: "54:43:B2:71:BB:38"   # MAC de office-light-switch

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

packages:
  device_base: !include packages/device_base.yaml
  tx_ultimate_migrated: !include packages/tx_ultimate_migrated.yaml

# ── ESP-NOW fallback : pilote relay_1 de office-light-switch quand HA est down ─
external_components:
  - source:
      type: git
      url: https://github.com/AntorFr/esphome-espnow
      ref: main
    refresh: 0s
    components: [espnow_sender]

espnow_sender:
  id: espnow_tx
  peer_mac: ${espnow_peer_mac}
  connectivity_sensor_id: api_connected   # réutilise le binary_sensor hw.yaml (delayed_off: 30s)
  fallback_timeout: 30s
  recovery_timeout: 10s
  action: toggle
  #on_fallback_enter:
  #  - light.turn_on:
  #      id: leds_top
  #      effect: "Scan"
  #on_fallback_exit:
  #  - light.turn_on:
  #      id: leds_top

binary_sensor:
  - platform: homeassistant
    id: applique_state
    entity_id: ${ha_applique_id}
    internal: true
    trigger_on_initial_state: true
  - platform: homeassistant
    id: plafonnier_state
    entity_id: ${ha_plafonnier_id}
    internal: true
    trigger_on_initial_state: true

# ── Composant switch principal ────────────────────────────────────────────────
tx_ultimate_switch:
  upside_down: true
  buttons:
    - position: left
      switch_relay: fallback_wifi
      relay:
        id: relay_1
        name: "Relay"
        restore_mode: RESTORE_DEFAULT_ON
        entity_category: diagnostic
        internal: false
      state_sensor: applique_state
      sensor:
        name: "Bouton gauche"
        icon: mdi:gesture-tap
        device_class: motion
    - position: center
      state_sensor: plafonnier_state
      switch_relay: false
      sensor:
        name: "Bouton centre"
        icon: mdi:gesture-tap
        device_class: motion
        on_press:
          - lambda: id(espnow_tx).send_command(true);
    - position: right
      switch_relay: false
      sensor:
        name: "Bouton droite"
        icon: mdi:gesture-tap
        device_class: motion

    


