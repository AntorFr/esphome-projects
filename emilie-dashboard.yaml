# reTerminal D1001 (ESP32-P4) dashboard for Émilie's room.
# Consumes the ha_dashboard + homeassistant_addon components and the board/fonts packages from
# github://AntorFr/esphome-dashboard (ref: main). Mirrors the office example (audio + voice
# assistant + settings + weather + music launcher), wired to Émilie's room entities.
substitutions:
  device_name: emilie-dashboard
  friendly_name: Dashboard Émilie
  area: "Chambre Émilie"
  # Launcher cover encoding: jpg (small transfer) | bmp (near-free decode). Drives the
  # online_image slots' format AND the music_library group's image_format.
  ml_img_fmt: jpg

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}
  on_boot:
    # Start local wake-word detection once everything is up (also (re)started on HA connect
    # and after each pipeline run, see voice_assistant below).
    - priority: -100
      then:
        - delay: 2s
        - micro_wake_word.start:

# Keep the radio always on (merges with device_base's wifi). The ESP32 default light-sleep adds
# latency and drops time-sensitive streamed fetches (HA TTS/media over the C6/SDIO link) — the
# cause of intermittent "TTS plays once then nothing". HA Voice PE also uses none.
wifi:
  power_save_mode: none

logger:
  level: DEBUG

packages:
  # wifi / ota / api (encrypted) / diagnostics / restart buttons.
  device_base: !include packages/device_base.yaml
  # D1001 board (MIPI-DSI display, GSL3670 touch, lvgl, psram, esp_ldo, esp32_hosted WiFi via C6,
  # audio I2S ES8311/ES7210, PA, battery, backlight) + dashboard fonts — pulled from the lib.
  board:
    url: https://github.com/AntorFr/esphome-dashboard
    file: packages/boards/reterminal_d1001.yaml
    ref: main
    refresh: 0s
  fonts:
    url: https://github.com/AntorFr/esphome-dashboard
    file: packages/fonts/montserrat_fr.yaml
    ref: main
    refresh: 0s

external_components:
  - source:
      type: git
      url: https://github.com/AntorFr/esphome-dashboard
      ref: main
    components: [ha_dashboard, homeassistant_addon]
    refresh: 0s

# Diagnostics: heap + loop health, and the reset reason (why a reboot happened).
debug:
  update_interval: 30s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"

sensor:
  - platform: debug
    free:
      name: "Heap libre"
    fragmentation:
      name: "Heap fragmentation"
    loop_time:
      name: "Loop time"

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris

# Multi-day weather forecast, fetched directly from HA via weather.get_forecasts
# (capture_response: no HA-side template sensor). Reformatted into a compact
# "condition|low|high;..." string and handed to the dashboard. On HA connect + every 30 min.
script:
  - id: fetch_forecast
    then:
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: weather.petit_mars
            type: daily
          capture_response: true
          on_success:
            - lambda: |-
                // HA wraps the service response one level deep under "response".
                std::string out;
                int n = 0;
                JsonArrayConst f = response["response"]["weather.petit_mars"]["forecast"].as<JsonArrayConst>();
                for (JsonObjectConst d : f) {
                  if (n++ >= 6) break;
                  if (!out.empty()) out += ";";
                  out += std::string(d["condition"].as<const char *>()) + "|" +
                         std::to_string((int) lroundf(d["templow"].as<float>())) + "|" +
                         std::to_string((int) lroundf(d["temperature"].as<float>()));
                }
                id(emilie_dash)->set_forecast(out);
          on_error:
            - logger.log:
                format: "get_forecasts action FAILED"
                level: WARN

interval:
  - interval: 30min
    then:
      - script.execute: fetch_forecast

# Side button (GPIO3, active-low): short-press toggles extended standby (backlight off/on).
binary_sensor:
  - platform: gpio
    id: d1001_side_button
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      - lambda: "id(emilie_dash)->toggle_deep_standby();"

# HTTP client for the Music Library launcher (ESP -> music-library REST API).
http_request:
