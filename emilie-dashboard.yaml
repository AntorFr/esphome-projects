# === Voice assistant (wake word local + HA Assist), reflected into the dashboard overlay ===
# Always-on MIXER speaker chain (mirrors HA Voice PE) so short announcements/TTS actually play.
# announcement_pipeline -> announcement_resampling_speaker -> announcement_mixing_input
#                       -> mixing_speaker -> d1001_speaker (i2s, always on)
speaker:
  - platform: mixer
    id: mixing_speaker
    output_speaker: d1001_speaker      # the board's raw i2s speaker (16 kHz, ES8311)
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input

# format: NONE compiles ALL decoders (MP3/FLAC/WAV/OPUS): HA streams TTS as .mp3, so a fixed
# FLAC format would fail to decode it.
media_player:
  - platform: speaker
    id: d1001_media
    name: "Enceinte Chambre Émilie"   # exposed to HA (TTS/announcements/media to the device)
    # After any playback (notably a boosted voice response) returns to idle, restore the device
    # volume — so the 100% TTS boost from on_tts_start doesn't stick for the next media/click.
    on_idle:
      - media_player.volume_set:
          id: d1001_media
          volume: !lambda "return id(cfg_volume).state / 100.0f;"
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: NONE
    media_pipeline:
      speaker: media_resampling_speaker
      format: NONE
    files:
      - id: wake_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      - id: timer_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: click_sound   # short UI click for touch feedback (FLAC — avoids the mono-MP3 issue)
        file: sounds/tx_ultimate/explore_the_stars/clic.flac

# Local custom wake word "Ok Nestor" (model shipped in this repo).
micro_wake_word:
  models:
    - model: micro-wake-word/models/Nestor.json
      id: nestor
  microphone:
    microphone: d1001_microphone
  on_wake_word_detected:
    - media_player.speaker.play_on_device_media_file:
        id: d1001_media
        media_file: wake_sound
        announcement: true
    - voice_assistant.start:

voice_assistant:
  id: emilie_voice
  microphone:
    microphone: d1001_microphone
  media_player: d1001_media
  on_listening:
    - lambda: "id(emilie_dash)->voice_listening();"
  on_stt_end:
    - lambda: "id(emilie_dash)->voice_thinking();"
  on_tts_start:
    - lambda: "id(emilie_dash)->voice_responding();"
    # Voice responses always play at full volume, independent of the device volume. The speaker
    # media_player applies one gain to BOTH pipelines, so boost to 100% for the response; the
    # media_player's on_idle restores cfg_volume once it finishes. The UI click stays on cfg_volume.
    - media_player.volume_set:
        id: d1001_media
        volume: 1.0
  on_end:
    - lambda: "id(emilie_dash)->voice_end();"
    - micro_wake_word.start:
  on_error:
    - lambda: "id(emilie_dash)->voice_error();"
  on_client_connected:
    - lambda: "id(emilie_dash)->voice_set_available(true);"
    - micro_wake_word.start:
    - delay: 4s
    - script.execute: fetch_forecast
  on_client_disconnected:
    - lambda: "id(emilie_dash)->voice_set_available(false);"
    - micro_wake_word.stop:
  on_timer_started:
    - lambda: "id(emilie_dash)->timer_started(timer.id, timer.name, timer.seconds_left);"
  on_timer_updated:
    - lambda: "id(emilie_dash)->timer_updated(timer.id, timer.seconds_left, timer.is_active);"
  on_timer_cancelled:
    - lambda: "id(emilie_dash)->timer_cancelled(timer.id);"
  on_timer_finished:
    - lambda: "id(emilie_dash)->timer_finished(timer.id);"
    - media_player.speaker.play_on_device_media_file:
        id: d1001_media
        media_file: timer_sound
        announcement: true

# === Émilie's room entities ===
# Touch click feedback on/off (settings entity, gates ha_dashboard on_tap).
switch:
  - platform: template
    name: "Clic tactile"
    id: cfg_click
    icon: mdi:gesture-tap
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: homeassistant
    id: sw_prise_bureau
    entity_id: switch.chambre_emilie_prise_bureau
    name: "Prise bureau"
    internal: true
  - platform: homeassistant
    id: sw_adaptive
    entity_id: switch.adaptive_lighting_chambre_emilie
    name: "Lumière adaptative"
    internal: true

# Non-switch HA entities via homeassistant_addon (cover / climate / media_player / light).
cover:
  - platform: homeassistant_addon
    id: cover_volet
    entity_id: cover.chambre_emilie_volet_roulant
    name: "Volet"
    internal: true

climate:
  - platform: homeassistant_addon
    id: climate_emilie
    entity_id: climate.chambre_emilie
    name: "Chauffage"
    internal: true

homeassistant_addon:
  media_players:
    - id: media_emilie
      entity_id: media_player.emilie
      volume_step: 0.05
  lights:
    - id: light_plafonnier
      entity_id: light.chambre_emilie_plafonnier
    - id: light_horloge
      entity_id: light.emilie_clock_led_matrix

# Configurable settings, exposed to HA AND driven by the on-device settings shade (single
# source of truth). Each applies its effect in on_value and persists (restore_value).
number:
  - platform: template
    name: "Volume"
    id: cfg_volume
    icon: mdi:volume-high
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    on_value:
      - media_player.volume_set:
          id: d1001_media
          volume: !lambda "return x / 100.0f;"
  - platform: template
    name: "Luminosité"
    id: cfg_brightness
    icon: mdi:brightness-6
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 10
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    on_value:
      - light.turn_on:
          id: d1001_backlight
          brightness: !lambda "return x / 100.0f;"
  - platform: template
    name: "Mise en veille"
    id: cfg_standby
    icon: mdi:timer-outline
    optimistic: true
    restore_value: true
    initial_value: 3
    min_value: 0        # 0 = jamais (veille prolongée désactivée)
    max_value: 30
    step: 1
    unit_of_measurement: "min"
    mode: box
    on_value:
      - lambda: "id(emilie_dash)->set_deep_standby_timeout(x <= 0 ? 0 : (uint32_t)(x * 60000));"

ha_dashboard:
  id: emilie_dash
  profile: reterminal_d1001
  language: fr
  inactivity_timeout: 120s
  time_id: sntp_time
  # Audible click feedback on button/tile taps — gated by the "Clic tactile" switch.
  on_tap:
    - if:
        condition:
          switch.is_on: cfg_click
        then:
          - media_player.speaker.play_on_device_media_file:
              id: d1001_media
              media_file: click_sound
              announcement: true
  # Extended standby: the backlight turns off after the "Mise en veille" delay; the next touch
  # or wake word turns it back on.
  on_deep_standby:
    - light.turn_off: d1001_backlight
  on_wake:
    - light.turn_on: d1001_backlight
  # Settings shade (swipe down): reads/writes these entities + shows the battery.
  volume_number: cfg_volume
  brightness_number: cfg_brightness
  standby_number: cfg_standby
  click_switch: cfg_click
  battery_sensor: d1001_battery
  charging_sensor: d1001_charging
  weather:
    entity: weather.petit_mars
  font_small: ha_font_small
  font_medium: ha_font_medium
  font_large: ha_font_large
  font_weather: ha_font_weather
  font_icons: ha_font_icons
  font_icons_lg: ha_font_icons_lg
  font_voice: ha_font_voice
  # Touch-only navigation (no encoder/button on the D1001).
  groups:
    - name: "Lumières"
      icon: light
      cards:
        - { type: light, light_id: light_plafonnier, name: "Plafonnier", color: "#FFB020" }
        - { type: light, light_id: light_horloge,    name: "Horloge",    color: "#00BCD4" }
    - name: "Chambre"
      icon: sofa
      cards:
        - { type: cover, cover_id: cover_volet, name: "Volet", color: "#577EFF", cover_kind: shutter }
        - { type: climate, climate_id: climate_emilie, name: "Chauffage", color: "#03A964" }
        - { type: switch, switch_id: sw_prise_bureau, name: "Prise bureau", color: "#607D8B" }
    - name: "Ambiance"
      icon: speaker
      cards:
        - { type: media_player, media_player_id: media_emilie, name: "Enceinte", color: "#A06CFF" }
        - { type: switch, switch_id: sw_adaptive, name: "Lum. adaptive", color: "#26A69A" }
    # Music Library launcher tab: Émilie's favourites -> her Music Assistant player.
    - name: "Musique"
      icon: music
      type: music_library
      http_request_id: ml_http
      base_url: "http://music-library.berard.me"
      owner: "Émilie"
      player: "media_player.emilie_2"     # Music Assistant player id
      player_name: "Chambre Émilie"       # shown in the launch-confirmation toast
      image_format: ${ml_img_fmt}
      cover_slots: [cov0, cov1, cov2, cov3, cov4, cov5, cov6, cov7, cov8, cov9]
      thumb_slots: [thm0, thm1, thm2, thm3, thm4, thm5, thm6, thm7, thm8, thm9,
                    thm10, thm11, thm12, thm13, thm14, thm15]
