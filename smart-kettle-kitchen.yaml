  # NTC-based presence detection (template binary sensor for HA)
  - platform: template
    id: kettle_presence
    name: "Kettle Presence"
    icon: "mdi:kettle"
    device_class: occupancy
  # GPIO12 removed from binary_sensor - now used as output for NTC test (see switch section)

sensor:
  - platform: template   
    name: "Rotary Value"
    id: rotary_value_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 0
  - platform: rotary_encoder
    id: rotation
    pin_a: GPIO16
    pin_b: GPIO17
    resolution: 1
    on_value:
      then:
        - lambda: |-
            // Rotary only active in IDLE and KEEP_WARM
            int state = id(kettle_state);
            if (state != 0 && state != 1) return;
            
            id(last_activity_time) = millis();
            id(last_rotary_time) = millis();
            float step = 1;
            if (abs(x) > 2) step = 2;
            if (abs(x) > 4) step = 5;
            float new_value = id(kettle_target_temperature) + (x * step);
            new_value = std::min(99, std::max(40, static_cast<int>(new_value)));
            id(kettle_target_temperature) = new_value;
            id(rotary_value_sensor).publish_state(new_value);
            id(target_temperature_number).publish_state(new_value);
        - sensor.rotary_encoder.set_value:
            id: rotation
            value: 0

  - platform: ntc
    id: ntc_temperature
    sensor: resistance_sensor_temperature
    calibration:
      b_constant: 4230
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: "NTC Temperature"
    #internal: true
    on_value:
      then:
        - lambda: |-
            // Skip NTC processing during test (prevents false presence detection + temp corruption)
            if (id(ntc_test_running)) return;
            
            // Update NTC watchdog timestamp
            id(last_ntc_update) = millis();
            
            if (!std::isnan(x)) {
              id(kettle_temperature) = (int)x;
            }
            
            // === NTC-based presence detection ===
            // Off base: NTC reads ~-31°C (open thermistor)
            // On base: NTC reads normal temp (>5°C)
            bool was_on_base = id(kettle_on_base);
            if (!std::isnan(x) && x > 5.0f) {
              id(kettle_on_base) = true;
            } else if (std::isnan(x) || x < -10.0f) {
              id(kettle_on_base) = false;
            }
            // else: in hysteresis band (-10 to 5°C), keep previous state
            
            bool now_on_base = id(kettle_on_base);
            
            // Transition: OFF -> ON (kettle placed on base)
            if (!was_on_base && now_on_base) {
              id(last_activity_time) = millis();
              id(kettle_presence).publish_state(true);
              id(buzzer_beep_short).execute();
              ESP_LOGI("kettle", "Kettle ON base (NTC: %.1f°C)", x);
            }
            
            // Transition: ON -> OFF (kettle removed)
            if (was_on_base && !now_on_base) {
              id(last_activity_time) = millis();
              id(kettle_presence).publish_state(false);
              ESP_LOGW("kettle", "Kettle OFF base (NTC: %.1f°C)", x);
              if (id(kettle_state) != 0) {
                id(heater_switch_relay).turn_off();
                id(heater_switch_triac).turn_off();
                id(kettle_state) = 0;
                ESP_LOGW("safety", "Kettle removed - immediate stop!");
                id(on_state_change).execute();
              }
            }
        - script.execute: control_loop
