substitutions:
  device_name: smart-kettle-kitchen
  friendly_name: "Bouilloire"
  area: "Cuisine"
  heater_enabled: "true"    # Master switch: "false" = dry-run, "true" = real heating

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name} 
  area: ${area}
  on_boot:
    priority: -10
    then:
      - script.execute: on_state_change
      - lambda: |-
          id(last_activity_time) = millis();
          id(rotary_value_sensor).publish_state(id(kettle_target_temperature));
          id(target_temperature_number).publish_state(id(kettle_target_temperature));

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf # Suggest using the ESP-IDF Framework. Changing from 'arduino' to 'esp-idf' needs a cabled flash to correct partitions
    version: recommended

    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
    advanced:
      ignore_efuse_mac_crc: true
      ignore_efuse_custom_mac: true  #added in 2024-11 as a fix https://community.home-assistant.io/t/xiaomi-mi-led-desk-lamp-1s-error-integration/787346

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: ${device_name}.intra.sberard.fr

  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

captive_portal:
safe_mode:
web_server:

logger:
  level: INFO
  logs:
    sensor: INFO          # Suppress DEBUG spam from ADC/NTC/resistance
    adc: INFO
    pulse_counter: INFO


#######################################
# Device specific Config Begins Below #
#######################################

external_components:
  - source:
      type: git
      url: https://github.com/AntorFr/esphome-tm1640
      ref: main
    refresh: 0s

packages:
  device_base: !include packages/device_base.yaml

time:
  - platform: homeassistant
    id: homeassistant_time


text_sensor:
  - platform: version
    name: Version
  - platform: template
    name: "Kettle State"
    id: kettle_state_text
    icon: "mdi:kettle"


globals:
  # Temperature sensor (SIID: 2, PIID: 3)
  # Range: -30°C to 100°C, Step: 1
  - id: kettle_temperature
    type: int
    restore_value: yes
    initial_value: '0'

  # Target temperature (SIID: 2, PIID: 4)
  # Range: 40°C to 99°C, Step: 1
  - id: kettle_target_temperature
    type: int
    restore_value: yes
    initial_value: '40'

  # State machine: 0=IDLE, 1=KEEP_WARM, 2=BOILING, 5=ERROR
  - id: kettle_state
    type: int
    restore_value: no
    initial_value: '0'

  # Fault code: 0=none, 1=overheat, 2=max_time, 3=dry_fire, 4=ntc_test_fail, 5=ntc_watchdog, 6=rate_of_rise
  - id: kettle_fault
    type: int
    restore_value: no
    initial_value: '0'

  # Last NTC update timestamp (for watchdog: >5s without update → kill heater)
  - id: last_ntc_update
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Previous temperature reading (for rate of rise detection)
  - id: prev_temperature
    type: int
    restore_value: no
    initial_value: '0'

  # True once target temperature has been reached in KEEP_WARM (switches from initial heating to maintenance)
  - id: target_reached
    type: bool
    restore_value: no
    initial_value: 'false'

  # Timestamp when heating started (for safety timeouts)
  - id: boil_start_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Temperature when heating started (for dry fire detection)
  - id: temp_at_start
    type: int
    restore_value: no
    initial_value: '0'

  # Timestamp when keep-warm mode started
  - id: keep_warm_start_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Kettle on base (detected via NTC: <-10°C = off, >5°C = on)
  - id: kettle_on_base
    type: bool
    restore_value: no
    initial_value: 'false'

  # Last user activity timestamp (for sleep mode after 60s idle)
  - id: last_activity_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Last rotary encoder movement (for temporary target display in IDLE)
  - id: last_rotary_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # NTC pre-heat test passed (chain GPIO12→Q5→R38→ADC validated)
  - id: ntc_validated
    type: bool
    restore_value: no
    initial_value: 'false'

  # NTC test in progress (blocks NTC on_value: presence detection + temp update + control_loop)
  - id: ntc_test_running
    type: bool
    restore_value: no
    initial_value: 'false'

  # Pending heating mode after NTC test: 0=none, 1=keep_warm, 2=boil
  - id: pending_heat_mode
    type: int
    restore_value: no
    initial_value: '0'

# Miot spec: https://home.miot-spec.com/spec?type=urn:miot-spec-v2:device:kettle:0000A009:xiaomi-v21:1
#
# ################################################################
# # Service 2 - Main Kettle Functions
# ################################################################
#
# # Status sensor (SIID: 2, PIID: 1)
# # Permissions: Read notification
# # Values: 0=Idle, 1=Keep Warm, 2=Boiling, 5=Error
# - id: kettle_status
#   type: int
#   restore_value: yes
#   initial_value: '0'
#
# # Fault sensor (SIID: 2, PIID: 2)
# # Permissions: Read notification
# # Range: 0-255, Step: 1
# - id: kettle_fault
#   type: int
#   restore_value: yes
#   initial_value: '0'
#
# # Temperature sensor (SIID: 2, PIID: 3) -> globals: kettle_temperature
# # Target temperature (SIID: 2, PIID: 4) -> globals: kettle_target_temperature
#
# # Auto keep warm (SIID: 2, PIID: 5)
# # Keep warm temperature (SIID: 2, PIID: 6)
# # Switch Status (SIID: 2, PIID: 7)
# # Service 3 - Extended Functions (SIID: 3)
# # Service 4 - Knob Settings (SIID: 4)
# # Service 5 - Local Timing (SIID: 5)
# # Service 6 - Do Not Disturb (SIID: 6)
# (All above services commented out - see miot spec for details)

script:
  - id: buzzer_beep_short
    then:
      - output.turn_on: buzzer_output
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 2000Hz
      - output.set_level:
          id: buzzer_output
          level: 50%
      - delay: 50ms
      - output.turn_off: buzzer_output

  - id: buzzer_beep_done
    then:
      - output.turn_on: buzzer_output
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 2000Hz
      - output.set_level:
          id: buzzer_output
          level: 50%
      - delay: 100ms
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 2500Hz
      - delay: 100ms
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 3000Hz
      - delay: 150ms
      - output.turn_off: buzzer_output

  - id: buzzer_beep_error
    then:
      - output.turn_on: buzzer_output
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 800Hz
      - output.set_level:
          id: buzzer_output
          level: 50%
      - delay: 200ms
      - output.turn_off: buzzer_output
      - delay: 100ms
      - output.turn_on: buzzer_output
      - output.ledc.set_frequency:
          id: buzzer_output
          frequency: 800Hz
      - output.set_level:
          id: buzzer_output
          level: 50%
      - delay: 200ms
      - output.turn_off: buzzer_output

  - id: buzzer_alarm
    then:
      - repeat:
          count: 5
          then:
            - output.turn_on: buzzer_output
            - output.ledc.set_frequency:
                id: buzzer_output
                frequency: 1000Hz
            - output.set_level:
                id: buzzer_output
                level: 80%
            - delay: 300ms
            - output.turn_off: buzzer_output
            - delay: 200ms

  # NTC pre-heat test: perturb analog chain via Q5 (GPIO12), verify recovery, check zero-cross
  # Flow: check on_base → GPIO12 ON (perturb) → GPIO12 OFF → read ADC → validate → check 50Hz
  - id: ntc_pre_heat_test
    mode: single
    then:
      - lambda: |-
          // STEP 0: Preconditions
          id(heater_switch_relay).turn_off();
          id(heater_switch_triac).turn_off();
          
          if (!id(kettle_on_base)) {
            ESP_LOGE("ntc_test", "FAIL: kettle not on base - cannot test");
            id(ntc_validated) = false;
            id(pending_heat_mode) = 0;
            id(buzzer_beep_error).execute();
            return;
          }
          
          id(ntc_test_running) = true;
          ESP_LOGI("ntc_test", "=== PRE-HEAT TEST START ===");
      - switch.turn_on: ntc_test_switch
      - delay: 100ms
      - switch.turn_off: ntc_test_switch
      - delay: 100ms
      - component.update: adc_sensor_temperature
      - delay: 50ms
      - lambda: |-
          // STEP 1: Read post-perturbation values and validate recovery
          float post_V = id(adc_sensor_temperature).state;
          float post_R = id(resistance_sensor_temperature).state;
          float post_T = id(ntc_temperature).state;
          ESP_LOGW("ntc_test", "POST-PERTURB: V=%.4f V, R=%.1f Ohm, T=%.1f C", post_V, post_R, post_T);
          
          if (std::isnan(post_T)) {
            ESP_LOGE("ntc_test", "FAIL: T is NaN after perturbation - ADC chain broken");
            id(ntc_validated) = false;
          } else if (post_T < 0.0f) {
            ESP_LOGE("ntc_test", "FAIL: T=%.1f C < 0 - NTC not recovered (open circuit?)", post_T);
            id(ntc_validated) = false;
          } else if (post_T > 105.0f) {
            ESP_LOGE("ntc_test", "FAIL: T=%.1f C > 105 - reading stuck high", post_T);
            id(ntc_validated) = false;
          } else {
            ESP_LOGI("ntc_test", "NTC CHECK PASS: T=%.1f C in normal range", post_T);
            id(ntc_validated) = true;
          }
          id(ntc_test_running) = false;
      - lambda: |-
          // STEP 2: Zero-cross check (GPIO33 must read ~50Hz when mains powered)
          if (!id(ntc_validated)) {
            // NTC already failed, skip zero-cross
          } else {
            float freq = id(gpio33_frequency).state;
            ESP_LOGW("ntc_test", "ZERO-CROSS: GPIO33=%.1f Hz (expected ~50Hz)");
            if (std::isnan(freq) || freq < 40.0f || freq > 65.0f) {
              ESP_LOGE("ntc_test", "FAIL: zero-cross %.1f Hz out of range [40-65] - mains/circuit issue", freq);
              id(ntc_validated) = false;
            } else {
              ESP_LOGI("ntc_test", "ZERO-CROSS PASS: %.1f Hz", freq);
            }
          }
      - lambda: |-
          // STEP 3: Result and auto-start
          if (id(ntc_validated)) {
            ESP_LOGI("ntc_test", "=== PRE-HEAT TEST PASS ===");
            int pending = id(pending_heat_mode);
            id(pending_heat_mode) = 0;
            if (pending == 2) {
              // Relay ON once (triac modulated by control_loop)
              if (strcmp("${heater_enabled}", "true") == 0) {
                id(heater_switch_relay).turn_on();
                ESP_LOGI("heater", "Relay ON for BOIL");
              } else {
                ESP_LOGW("heater", "Relay ON skipped (dry-run)");
              }
              id(kettle_state) = 2;
              id(boil_start_time) = millis();
              id(temp_at_start) = id(kettle_temperature);
              ESP_LOGI("kettle", "BOIL started at %d°C (post test)", id(kettle_temperature));
              id(buzzer_beep_short).execute();
              id(on_state_change).execute();
            } else if (pending == 1) {
              // Relay ON once (triac modulated by control_loop)
              if (strcmp("${heater_enabled}", "true") == 0) {
                id(heater_switch_relay).turn_on();
                ESP_LOGI("heater", "Relay ON for KEEP_WARM");
              } else {
                ESP_LOGW("heater", "Relay ON skipped (dry-run)");
              }
              id(kettle_state) = 1;
              id(target_reached) = false;
              id(boil_start_time) = millis();
              id(temp_at_start) = id(kettle_temperature);
              id(keep_warm_start_time) = millis();
              ESP_LOGI("kettle", "KEEP_WARM to %d°C at %d°C (post test)",
                       id(kettle_target_temperature), id(kettle_temperature));
              id(buzzer_beep_short).execute();
              id(on_state_change).execute();
            } else {
              id(buzzer_beep_done).execute();
            }
          } else {
            id(pending_heat_mode) = 0;
            id(kettle_state) = 5;
            id(kettle_fault) = 4;
            ESP_LOGE("ntc_test", "=== PRE-HEAT TEST FAIL - heating blocked ===");
            id(on_state_change).execute();
            id(buzzer_beep_error).execute();
          }

  # Publishes kettle state to HA text sensor - called on every state change
  - id: on_state_change
    mode: restart
    then:
      - lambda: |-
          id(last_activity_time) = millis();
          const char* states[] = {"Idle", "Keep Warm", "Boiling", "?", "?", "Error"};
          int s = id(kettle_state);
          if (s == 0 || s == 1 || s == 2 || s == 5)
            id(kettle_state_text).publish_state(states[s]);
          else
            id(kettle_state_text).publish_state("Unknown");

  # Triac ON (modulation) - relay must already be ON from heating start
  # Respects heater_enabled substitution, skips if already ON
  - id: heater_on
    mode: single
    then:
      - if:
          condition:
            lambda: 'return strcmp("${heater_enabled}", "true") == 0 && !id(heater_switch_triac).state;'
          then:
            - switch.turn_on: heater_switch_triac

  # Triac OFF (modulation) - relay stays ON for next modulation cycle
  # Always executes regardless of heater_enabled (safety: always allow OFF)
  # Skips if already OFF to avoid log spam
  - id: heater_off
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(heater_switch_triac).state;'
          then:
            - switch.turn_off: heater_switch_triac

  # Main control loop - triggered by NTC temperature updates (event-driven, every ~1s)
  - id: control_loop
    mode: single
    then:
      - lambda: |-
          int prev_state = id(kettle_state);
          int state = prev_state;
          int cur_temp = id(kettle_temperature);
          int target = id(kettle_target_temperature);
          
          // === SAFETY CHECKS (always active) ===
          
          // NTC watchdog: no update in >5s → kill heater
          if (state != 0 && state != 5) {
            if (id(last_ntc_update) > 0 && millis() - id(last_ntc_update) > 5000) {
              id(heater_switch_triac).turn_off();
              id(heater_switch_relay).turn_off();
              id(kettle_state) = 5;
              id(kettle_fault) = 5;
              ESP_LOGE("safety", "NTC WATCHDOG: no update in >5s - emergency stop!");
              id(buzzer_alarm).execute();
              id(on_state_change).execute();
              return;
            }
          }
          
          // Rate of rise: >10°C/s → sensor malfunction
          if (state != 0 && state != 5) {
            int delta_temp = cur_temp - id(prev_temperature);
            if (abs(delta_temp) > 10) {
              id(heater_switch_triac).turn_off();
              id(heater_switch_relay).turn_off();
              id(kettle_state) = 5;
              id(kettle_fault) = 6;
              ESP_LOGE("safety", "RATE OF RISE: %d°C/s (prev=%d, cur=%d) - sensor fault!",
                       delta_temp, id(prev_temperature), cur_temp);
              id(buzzer_alarm).execute();
              id(on_state_change).execute();
              return;
            }
          }
          
          // Update prev_temperature for next cycle
          id(prev_temperature) = cur_temp;
          
          // Overheat protection (105°C)
          if (cur_temp > 105) {
            id(heater_switch_relay).turn_off();
            id(heater_switch_triac).turn_off();
            id(kettle_state) = 5;
            id(kettle_fault) = 1;
            ESP_LOGE("safety", "OVERHEAT: %d°C - emergency stop!", cur_temp);
            id(buzzer_alarm).execute();
            id(on_state_change).execute();
            return;
          }
          
          // Max heating time (10 min) - for BOILING and KEEP_WARM initial heating phase
          if ((state == 2 || (state == 1 && !id(target_reached))) && id(boil_start_time) > 0) {
            if (millis() - id(boil_start_time) > 600000) {
              id(heater_switch_relay).turn_off();
              id(heater_switch_triac).turn_off();
              id(kettle_state) = 5;
              id(kettle_fault) = 2;
              ESP_LOGE("safety", "MAX_HEAT_TIME (10min) - emergency stop!");
              id(buzzer_alarm).execute();
              id(on_state_change).execute();
              return;
            }
          }
          
          // Kettle removed during operation
          if (state != 0 && state != 5) {
            if (!id(kettle_on_base)) {
              id(heater_switch_relay).turn_off();
              id(heater_switch_triac).turn_off();
              id(kettle_state) = 0;
              ESP_LOGW("safety", "Kettle removed - stopping");
              id(on_state_change).execute();
              return;
            }
          }
          
          // Dry fire detection (heating >90s, temp rise <3°C, temp <50°C)
          if ((state == 2 || (state == 1 && !id(target_reached))) && id(boil_start_time) > 0) {
            uint32_t elapsed = millis() - id(boil_start_time);
            if (elapsed > 90000 && cur_temp < 50) {
              int rise = cur_temp - id(temp_at_start);
              if (rise < 3) {
                id(heater_switch_relay).turn_off();
                id(heater_switch_triac).turn_off();
                id(kettle_state) = 5;
                id(kettle_fault) = 3;
                ESP_LOGE("safety", "DRY FIRE: +%d°C in %lus", rise, elapsed/1000);
                id(buzzer_alarm).execute();
                id(on_state_change).execute();
                return;
              }
            }
          }
          
          // === STATE MACHINE ===
          
          switch (state) {
            case 0:  // IDLE - nothing to do
              break;
              
            case 1: {  // KEEP_WARM (unified: heat to target + maintain)
              // 30min total timeout from button press
              if (millis() - id(keep_warm_start_time) > 1800000) {
                id(heater_switch_triac).turn_off();
                id(heater_switch_relay).turn_off();
                id(kettle_state) = 0;
                ESP_LOGI("kettle", "Keep-warm timeout (30min)");
                id(buzzer_beep_done).execute();
                break;
              }
              
              // Check if target reached for the first time
              if (!id(target_reached) && cur_temp >= target) {
                id(target_reached) = true;
                id(heater_off).execute();
                ESP_LOGI("kettle", "Target %d°C reached - maintaining", target);
                id(buzzer_beep_done).execute();
                break;
              }
              
              // --- Proportional heating (same logic for initial & maintenance) ---
              int delta = target - cur_temp;
              if (delta <= 0) {
                // At or above target: heater off
                id(heater_off).execute();
              } else {
                // Heater on, power proportional to delta
                // Power level: delta>10=100%, >5=70%, >2=40%, <=2=20%
                // For now using simple pulse approach (will be replaced by burst-control)
                if (delta <= 2) {
                  // 20% - very gentle
                  if ((millis() / 1000) % 5 == 0)
                    id(heater_on).execute();
                  else
                    id(heater_off).execute();
                } else if (delta <= 5) {
                  // 40%
                  if ((millis() / 1000) % 5 < 2)
                    id(heater_on).execute();
                  else
                    id(heater_off).execute();
                } else if (delta <= 10) {
                  // 70%
                  if ((millis() / 1000) % 10 < 7)
                    id(heater_on).execute();
                  else
                    id(heater_off).execute();
                } else {
                  // 100% - full power
                  id(heater_on).execute();
                }
              }
              break;
            }
              
            case 2:  // BOILING (full power to ~100°C then stop)
              if (cur_temp >= 99) {
                id(heater_switch_triac).turn_off();
                id(heater_switch_relay).turn_off();
                id(kettle_state) = 0;  // Always IDLE after boil
                ESP_LOGI("kettle", "Boil complete at %d°C", cur_temp);
                id(buzzer_beep_done).execute();
              } else {
                id(heater_on).execute();
              }
              break;
              
            case 5:  // ERROR - ensure everything is OFF
              id(heater_switch_triac).turn_off();
              id(heater_switch_relay).turn_off();
              break;
          }
          
          // Publish state change if state transitioned
          if (id(kettle_state) != prev_state) {
            id(on_state_change).execute();
          }

binary_sensor:
  - platform: status
    name: Device Status
    id: device_status
  - platform: gpio
    pin:
      number: GPIO18
      inverted: true
    name: "Button Boil - Touch"
    id: button_boil_touch
    on_press:
      then:
        - lambda: |-
            id(last_activity_time) = millis();
            ESP_LOGI("button", "BOIL pressed: state=%d, on_base=%d, keepwarm_btn=%d",
                     id(kettle_state), (int)id(kettle_on_base), (int)id(button_keepwarm_touch).state);
            // Skip if both buttons pressed (combo handler)
            if (id(button_keepwarm_touch).state) return;
            
            int state = id(kettle_state);
            switch (state) {
              case 0: {  // IDLE -> BOILING (via NTC test)
                if (!id(kettle_on_base)) {
                  ESP_LOGW("kettle", "Cannot boil: kettle not on base");
                  id(buzzer_beep_error).execute();
                  return;
                }
                if (id(kettle_temperature) >= 99) {
                  ESP_LOGI("kettle", "Already at %d°C - no need to boil", id(kettle_temperature));
                  id(buzzer_beep_short).execute();
                  return;
                }
                // Always re-test NTC before heating
                id(ntc_validated) = false;
                id(pending_heat_mode) = 2;
                id(ntc_pre_heat_test).execute();
                return;
              }
              case 1:  // KEEP_WARM -> switch to BOILING
                id(kettle_state) = 2;
                id(boil_start_time) = millis();
                id(temp_at_start) = id(kettle_temperature);
                ESP_LOGI("kettle", "Switched to BOIL at %d°C", id(kettle_temperature));
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
              case 2:  // BOILING -> STOP (same button)
                id(heater_switch_relay).turn_off();
                id(heater_switch_triac).turn_off();
                id(kettle_state) = 0;
                ESP_LOGI("kettle", "Stopped by Boil button");
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
              case 5:  // ERROR -> clear
                id(kettle_state) = 0;
                id(kettle_fault) = 0;
                ESP_LOGI("kettle", "Error cleared");
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
            }
  - platform: gpio
    pin:
      number: GPIO19
      inverted: true
    name: "Button Keep Warm - Touch"
    id: button_keepwarm_touch
    on_press:
      then:
        - lambda: |-
            id(last_activity_time) = millis();
            ESP_LOGI("button", "KEEPWARM pressed: state=%d, on_base=%d, boil_btn=%d",
                     id(kettle_state), (int)id(kettle_on_base), (int)id(button_boil_touch).state);
            // Skip if both buttons pressed (combo handler)
            if (id(button_boil_touch).state) return;
            
            int state = id(kettle_state);
            switch (state) {
              case 0: {  // IDLE -> KEEP_WARM (via NTC test)
                if (!id(kettle_on_base)) {
                  ESP_LOGW("kettle", "Cannot heat: kettle not on base");
                  id(buzzer_beep_error).execute();
                  return;
                }
                // Always re-test NTC before heating
                id(ntc_validated) = false;
                id(pending_heat_mode) = 1;
                id(ntc_pre_heat_test).execute();
                return;
              }
              case 2: {  // BOILING -> switch to KEEP_WARM
                id(kettle_state) = 1;
                id(target_reached) = (id(kettle_temperature) >= id(kettle_target_temperature));
                id(boil_start_time) = millis();
                id(temp_at_start) = id(kettle_temperature);
                id(keep_warm_start_time) = millis();
                ESP_LOGI("kettle", "Switched to KEEP_WARM %d°C at %d°C",
                         id(kettle_target_temperature), id(kettle_temperature));
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
              }
              case 1:  // KEEP_WARM -> STOP (same button)
                id(heater_switch_relay).turn_off();
                id(heater_switch_triac).turn_off();
                id(kettle_state) = 0;
                ESP_LOGI("kettle", "Stopped by Keep Warm button");
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
              case 5:  // ERROR -> clear
                id(kettle_state) = 0;
                id(kettle_fault) = 0;
                ESP_LOGI("kettle", "Error cleared");
                id(buzzer_beep_short).execute();
                id(on_state_change).execute();
                break;
            }
