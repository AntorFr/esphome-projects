#https://github.com/ssieb/esphome_components/tree/master/components/ht16k33_alpha

# TM1640 Display - Xiaomi Smart Kettle 2 Pro
# ============================================
# Verified memory mapping (shifted -2 from HA community post doc):
#
#   Byte 0   : Digit 1 (tens) - 7 segments
#   Byte 1   : Digit 2 (units) - 7 segments
#   Byte 2   : Special symbols
#              bit 1 (0x02) = WiFi
#              bit 4 (0x10) = °C
#              0x12 = both
#   Byte 3   : Orange LEDs right (1-7)
#   Byte 4   : Blue LEDs right (1-7)
#   Byte 5   : Red LEDs right (1-7)
#   Byte 6   : Orange LEDs left (8-12)
#   Byte 7   : Blue LEDs left (8-12)
#   Byte 8   : Red LEDs left (8-12)
#
# Pins: CLK=GPIO26, DIN=GPIO27
# Chip: TM1640 (NOT TM1637)
#
display:
  platform: tm1640
  id: tm1640_display
  clk_pin: GPIO26
  din_pin: GPIO27
  length: 10        # 2 digits + symbols + 6 bytes LED ring
  update_interval: 100ms
  intensity: 4       # Brightness 0-7
  inverted: false
  lambda: |-
    int state = id(kettle_state);
    int cur_temp = id(kettle_temperature);
    int target = id(kettle_target_temperature);
    bool on_base = id(kettle_on_base);
    
    // === SLEEP MODE (IDLE + no activity for 60s) ===
    if (state == 0 && millis() - id(last_activity_time) > 60000) {
      for (int i = 0; i <= 8; i++) it.set_raw(i, 0x00);
      if (id(button_boil_light).state) id(button_boil_light).turn_off();
      if (id(button_keepwarm_light).state) id(button_keepwarm_light).turn_off();
      return;
    }
    
    // === DIGITS (bytes 0-1) ===
    // Convention: °C shown only when displaying actual measured temperature
    //             °C hidden when displaying target temperature (user setting)
    bool showing_measured = false;
    int display_temp = std::min(cur_temp, 99);   // Cap to 2 digits
    switch (state) {
      case 0:  // IDLE
        // Rotary recently moved -> show target temp (no °C)
        if (millis() - id(last_rotary_time) < 2000) {
          it.printf("%2d", target);
          showing_measured = false;
        } else if (on_base && cur_temp > 0) {
          it.printf("%2d", display_temp);
          showing_measured = true;
        } else {
          it.set_raw(0, 0x40);  // '-'
          it.set_raw(1, 0x40);  // '-'
        }
        break;
      case 1:  // KEEP_WARM - measured temp, rotary shows target 2s
        if (millis() - id(last_rotary_time) < 2000) {
          it.printf("%2d", target);
          showing_measured = false;
        } else if (cur_temp > 0) {
          it.printf("%2d", display_temp);
          showing_measured = true;
        } else {
          it.set_raw(0, 0x40);  // '-'
          it.set_raw(1, 0x40);  // '-'
        }
        break;
      case 2:  // BOILING - always show measured temp
        if (cur_temp > 0) {
          it.printf("%2d", display_temp);
          showing_measured = true;
        } else {
          it.set_raw(0, 0x40);  // '-'
          it.set_raw(1, 0x40);  // '-'
        }
        break;
      case 5:  // ERROR - flash "Er"
        if ((millis() / 500) % 2 == 0) {
          it.set_raw(0, 0x79);  // E
          it.set_raw(1, 0x50);  // r
        }
        break;
      default:
        it.printf("%2d", target);
        break;
    }
    
    // === SYMBOLS (byte 2) ===
    uint8_t symbols = 0x00;
    if (wifi::global_wifi_component->is_connected()) {
      symbols |= 0x02;       // WiFi
    }
    // °C only when displaying actual measured temperature
    if (showing_measured) {
      symbols |= 0x10;
    }
    it.set_raw(2, symbols);
    
    // === LED RING (bytes 3-8) ===
    for (int i = 3; i <= 8; i++) it.set_raw(i, 0x00);  // Clear ring
    
    switch (state) {
      case 0:  // IDLE - blue static
        it.set_raw(4, 0x7F);   // Blue right (7 LEDs)
        it.set_raw(7, 0x1F);   // Blue left (5 LEDs)
        break;
      case 1:  // KEEP_WARM - orange ring
        it.set_raw(3, 0x7F);   // Orange right (7 LEDs)
        it.set_raw(6, 0x1F);   // Orange left (5 LEDs)
        break;
      case 2:  // BOILING - red ring
        it.set_raw(5, 0x7F);   // Red right (7 LEDs)
        it.set_raw(8, 0x1F);   // Red left (5 LEDs)
        break;
      case 5:  // ERROR - red flashing
        if ((millis() / 250) % 2 == 0) {
          it.set_raw(5, 0x7F);   // Red right
          it.set_raw(8, 0x1F);   // Red left
        }
        break;
    }
    
    // === BUTTON LEDs ===
    bool boil_led = false;
    bool keepwarm_led = false;
    switch (state) {
      case 0: break;  // IDLE - all off
      case 1:  // KEEP_WARM
        keepwarm_led = true;
        break;
      case 2:  // BOILING
        boil_led = true;
        break;
      case 5:  // ERROR - LEDs off (ring flashes red already)
        break;
    }
    if (id(button_boil_light).state != boil_led) {
      if (boil_led) id(button_boil_light).turn_on();
      else id(button_boil_light).turn_off();
    }
    if (id(button_keepwarm_light).state != keepwarm_led) {
      if (keepwarm_led) id(button_keepwarm_light).turn_on();
      else id(button_keepwarm_light).turn_off();
    }