substitutions:
  device_name: office-light-switch
  friendly_name: "Bouton lumiere bureau"
  area: "Bureau"

  # Capteur HA utilise comme inhibiteur de nightlight quand absent
  ha_away_sensor: input_boolean.away_mode
  
  nightlight_room_type: "bedroom"


  # ESP-NOW — MACs des senders
  espnow_peer_mac_desk: "54:43:B2:71:82:F4"      # MAC de desk-light-switch
  espnow_peer_mac_hallway: "54:43:B2:70:81:70"   # MAC de office-hallway-light-switch


esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

packages:
  device_base: !include packages/device_base.yaml
  tx_ultimate_migrated: !include packages/tx_ultimate_migrated.yaml

# ── ESP-NOW fallback : reçoit les commandes de desk-light-switch et office-hallway-light-switch ─
external_components:
  - source:
      type: git
      url: https://github.com/AntorFr/esphome-espnow
      ref: main
    refresh: 0s
    components: [espnow_receiver]

espnow_receiver:
  - id: espnow_rx_desk
    peer_mac: ${espnow_peer_mac_desk}      # desk-light-switch → relay_1
    light_id: relay_1
  - id: espnow_rx_hallway
    peer_mac: ${espnow_peer_mac_hallway}   # office-hallway-light-switch → relay_2
    light_id: relay_2

binary_sensor:
  # Swipe gauche : allume relay_2 pendant 30s (minuterie veilleuse)
  - id: !extend swipe_left
    on_press:
      - script.execute: swipe_left_timer

tx_ultimate_switch:
  upside_down: true
  buttons:
    - position: right
      switch_relay: true
      relay:
        id: relay_2
        name: "Couloir"
        output: l2_output
        restore_mode: RESTORE_DEFAULT_OFF
        internal: false
      sensor:
        name: "Bouton droite"
        icon: mdi:gesture-tap
        device_class: motion
    - position: center
      switch_relay: true
      relay:
        id: relay_1
        name: "Spots"
        output: l1_output
        restore_mode: RESTORE_DEFAULT_OFF
        internal: false
      sensor:
        name: "Bouton centre"
        icon: mdi:gesture-tap
        device_class: motion
    - position: left
      switch_relay: true
      relay:
        id: relay_3
        name: "Plafonier"
        output: l3_output
        restore_mode: RESTORE_DEFAULT_OFF
        internal: false
      sensor:
        name: "Bouton gauche"
        icon: mdi:gesture-tap
        device_class: motion

script:
  - id: swipe_left_timer
    mode: restart
    then:
      - light.turn_on: relay_2
      - delay: 30s
      - light.turn_off: relay_2
