substitutions:
  device_name: linky
  friendly_name: Linky

  HCJB_price: "0.1325"
  HPJB_price: "0.1612"
  HCJW_price: "0.1499"
  HPJW_price: "0.1871"
  HCJR_price: "0.1575"
  HPJR_price: "0.7060"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name} 

esp32:
  board: denky_d4
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.0'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: ${device_name}.intra.sberard.fr.

  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

captive_portal:

logger:
  level: INFO
  logs:
    teleinfo: ERROR

web_server:

#######################################
# Device specific Config Begins Below #
#######################################
packages:
  device_base:
    url: https://github.com/AntorFr/esphome-projects
    file: packages/device_base.yaml

uart:
  id: uart_bus
  rx_pin: 
    number: GPIO8
    ignore_pin_validation_error: true #Fix required to solve Pin validation broken by 2024.6 
  tx_pin: GPIO1
  baud_rate: 9600           # Mode standard (était 1200)
  parity: EVEN
  data_bits: 7
  rx_buffer_size: 512

teleinfo:
  id: myteleinfo
  update_interval: 5s
  historical_mode: false     # Mode standard (était true)

time:
  - platform: homeassistant
    timezone: "Europe/Paris"
    id: homeassistant_time

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: SK6812
    pin: GPIO14
    num_leds: 1
    name: "status"
    entity_category: config

#see here for more options: https://gist.github.com/mathieucarbou/886d2a6f5c0b51bb261d6a1329beb08d

#######################################
# Mapping mode historique → standard  #
# ISOUSC  → PREF                      #
# BBRHxxx → EASF01-06                 #
# IINST   → IRMS1                     #
# PAPP    → SINSTS                    #
# PTEC    → NTARF (mappé HCJB etc.)   #
# ADPS    → (supprimé)                #
# IMAX    → SMAXSN                    #
# Nouveau : SINSTI, EAIT, URMS1       #
#######################################

sensor:
  # Puissance de référence (remplace ISOUSC)
  - platform: teleinfo
    id: puiss_ref
    tag_name: "PREF"
    name: "Puissance de référence"
    unit_of_measurement: kVA
    state_class: measurement
    icon: mdi:current-ac
    entity_category: diagnostic

  # Index option Tempo (EASF01-06 remplacent BBRHxxxx)
  - platform: teleinfo
    tag_name: "EASF01"
    id: index_bleu_HC
    name: "Index Tempo Bleu HC"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - max:
    on_value:
      - script.execute: compute_index_total
  - platform: teleinfo
    tag_name: "EASF02"
    id: index_bleu_HP
    name: "Index Tempo Bleu HP"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - max:
    on_value:
      - script.execute: compute_index_total
  - platform: teleinfo
    tag_name: "EASF03"
    id: index_blanc_HC
    name: "Index Tempo Blanc HC"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - filter_out: 0.0
    on_value:
      - script.execute: compute_index_total
  - platform: teleinfo
    tag_name: "EASF04"
    id: index_blanc_HP
    name: "Index Tempo Blanc HP"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - filter_out: 0.0
    on_value:
      - script.execute: compute_index_total
  - platform: teleinfo
    tag_name: "EASF05"
    id: index_rouge_HC
    name: "Index Tempo Rouge HC"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - filter_out: 0.0
    on_value:
      - script.execute: compute_index_total
  - platform: teleinfo
    tag_name: "EASF06"
    id: index_rouge_HP
    name: "Index Tempo Rouge HP"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - filter_out: 0.0
    on_value:
      - script.execute: compute_index_total
  
  # Index total
  - platform: template
    id: index_total
    name: "Index Total"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    icon: mdi:transmission-tower-export
    accuracy_decimals: 3

  # Intensité Instantanée (IRMS1 remplace IINST)
  - platform: teleinfo
    tag_name: "IRMS1"
    name: "Intensité Instantanée"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    icon: mdi:current-ac

  # Tension Instantanée (nouveau en mode standard)
  - platform: teleinfo
    tag_name: "URMS1"
    name: "Tension Instantanée"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    icon: mdi:sine-wave

  # Puissance apparente soutirée (SINSTS remplace PAPP)
  - platform: teleinfo
    tag_name: "SINSTS"
    id: puiss_app
    name: "Puissance Apparente"
    unit_of_measurement: VA
    state_class: measurement
    device_class: apparent_power
    icon: mdi:gauge
    on_value:
      - sensor.template.publish:
          id: puiss_used
          state: !lambda 'return (x * 100.0) / (id(puiss_ref).state * 1000.0);'

  # Puissance apparente injectée (nouveau en mode standard)
  - platform: teleinfo
    tag_name: "SINSTI"
    id: puiss_inj
    name: "Puissance Injectée"
    unit_of_measurement: VA
    state_class: measurement
    device_class: apparent_power
    icon: mdi:transmission-tower-import

  # Énergie active injectée totale (nouveau en mode standard)
  - platform: teleinfo
    tag_name: "EAIT"
    name: "Énergie Injectée Totale"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    icon: mdi:transmission-tower-import
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # Puissance maximale soutirée du jour (remplace IMAX, en VA au lieu de A)
  - platform: teleinfo
    tag_name: "SMAXSN"
    name: "Puissance Maximale du Jour"
    unit_of_measurement: VA
    device_class: apparent_power
    state_class: measurement
    icon: mdi:gauge
    entity_category: diagnostic

 # Puissance utilisée
  - platform: template
    id: puiss_used
    name: "Puissance utilisée"
    unit_of_measurement: "%"
    accuracy_decimals: 2
    state_class: measurement
    icon: mdi:gauge

 # Prix kwh
  - platform: template
    id: kwh_price
    name: "Prix kWh"
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
  - platform: template
    name: "Prix kWh Bleu HC"
    id: HCJB
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HCJB_price};"
    entity_category: diagnostic
  - platform: template
    name: "Prix kWh Bleu HP"
    id: HPJB
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HPJB_price};"
    entity_category: diagnostic
  - platform: template
    name: "Prix kWh Blanc HC"
    id: HCJW
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HCJW_price};"
    entity_category: diagnostic
  - platform: template
    name: "Prix kWh Blanc HP"
    id: HPJW
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HPJW_price};"
    entity_category: diagnostic
  - platform: template
    name: "Prix kWh Rouge HC"
    id: HCJR
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HCJR_price};"
    entity_category: diagnostic

  # Puissance par mode tarifaire (inchangé)
  - platform: template
    id: puiss_bleu_hc
    name: "Puissance Bleu HC"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HCJB") return id(puiss_app).state;
      return 0;
  - platform: template
    id: puiss_bleu_hp
    name: "Puissance Bleu HP"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HPJB") return id(puiss_app).state;
      return 0;
  - platform: template
    id: puiss_blanc_hc
    name: "Puissance Blanc HC"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HCJW") return id(puiss_app).state;
      return 0;
  - platform: template
    id: puiss_blanc_hp
    name: "Puissance Blanc HP"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HPJW") return id(puiss_app).state;
      return 0;
  - platform: template
    id: puiss_rouge_hc
    name: "Puissance Rouge HC"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HCJR") return id(puiss_app).state;
      return 0;
  - platform: template
    id: puiss_rouge_hp
    name: "Puissance Rouge HP"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: mdi:flash
    accuracy_decimals: 0
    lambda: |-
      if (id(raw_price_period).state == "HPJR") return id(puiss_app).state;
      return 0;

  - platform: template
    name: "Prix kWh Rouge HP"
    id: HPJV
    unit_of_measurement: "€/kWh"
    device_class: monetary
    state_class: measurement
    accuracy_decimals: 4
    lambda: "return ${HPJR_price};"
    entity_category: diagnostic

text_sensor:
  # Période Tarifaire brute (NTARF remplace PTEC, mappé vers mêmes codes)
  - platform: teleinfo
    tag_name: "NTARF"
    id: raw_price_period
    name: "Période Tarifaire brute"
    internal: true
    filters:
    - substitute:
      - "01 -> HCJB"
      - "02 -> HPJB"
      - "03 -> HCJW"
      - "04 -> HPJW"
      - "05 -> HCJR"
      - "06 -> HPJR"
    on_value:
      - sensor.template.publish:
          id: kwh_price
          state: !lambda |-
           if( x == "HCJB" ) return ${HCJB_price};
           if( x == "HPJB" ) return ${HPJB_price};
           if( x == "HCJW" ) return ${HCJW_price};
           if( x == "HPJW" ) return ${HPJW_price};
           if( x == "HCJR" ) return ${HCJR_price};
           if( x == "HPJR" ) return ${HPJR_price};

  - platform: teleinfo
    tag_name: "NTARF"
    name: "Période Tarifaire"
    icon: mdi:information
    filters:
    - substitute:
      - "01 -> HC"
      - "02 -> HP"
      - "03 -> HC"
      - "04 -> HP"
      - "05 -> HC"
      - "06 -> HP"
  - platform: teleinfo
    tag_name: "NTARF"
    name: "Couleur actuelle"
    icon: mdi:information
    filters:
    - substitute:
      - "01 -> bleu"
      - "02 -> bleu"
      - "03 -> blanc"
      - "04 -> blanc"
      - "05 -> rouge"
      - "06 -> rouge"
  # Label tarifaire complet (nouveau en mode standard)
  - platform: teleinfo
    tag_name: "LTARF"
    name: "Label Tarifaire"
    icon: mdi:information
    entity_category: diagnostic


script:
  - id: compute_index_total
    mode: restart
    then:
      - sensor.template.publish:
          id: index_total
          state: !lambda |-
            return id(index_bleu_HC).state
             +id(index_bleu_HP).state
             +id(index_blanc_HC).state
             +id(index_blanc_HP).state
             +id(index_rouge_HC).state
             +id(index_rouge_HP).state;
